    <circle cx="600" cy="452" r="172" fill="none" stroke="#dffbff" stroke-width="1.7" stroke-opacity="0.44" stroke-dasharray="17 18"/>
    <circle cx="600" cy="452" r="118" fill="none" stroke="#ffcf5a" stroke-width="1.7" stroke-opacity="0.34" stroke-dasharray="5 14"/>
    <circle cx="600" cy="452" r="61" fill="none" stroke="#e8fbff" stroke-width="2.2" stroke-opacity="0.62"/>
  </g>

  <g fill="none" stroke="url(#lineGlow)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M364 452h472" stroke-width="2.8" stroke-opacity="0.58"/>
