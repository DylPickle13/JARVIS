<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Original JARVIS-style holographic interface background</title>
  <desc id="desc">An abstract cyan and gold AI interface with rings, waveforms, and circuit traces.</desc>
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="48%" r="52%">
      <stop offset="0" stop-color="#e8fbff" stop-opacity="0.95"/>
      <stop offset="0.12" stop-color="#7ee7ff" stop-opacity="0.62"/>
      <stop offset="0.38" stop-color="#2aa8ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#001426" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGlow" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#dffbff" stop-opacity="0.88"/>
      <stop offset="0.54" stop-color="#7ee7ff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#ffcf5a" stop-opacity="0.46"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="none"/>
  <g opacity="0.9" filter="url(#softGlow)">
    <ellipse cx="600" cy="452" rx="255" ry="255" fill="url(#coreGlow)"/>
